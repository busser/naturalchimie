<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <link rel="icon" href="data:," />
    <link rel="apple-touch-icon" href="data:," />
    <title>Naturalchimie</title>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <svg
        class="splash__flask"
        viewBox="0 0 100 120"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <clipPath id="splash-flask-clip">
            <circle cx="50" cy="72" r="29" />
          </clipPath>
        </defs>
        <rect
          x="42"
          y="12"
          width="16"
          height="12"
          rx="2"
          fill="#a06b3a"
          stroke="#2a1810"
          stroke-width="2"
        />
        <rect
          x="44"
          y="22"
          width="12"
          height="18"
          fill="#a8d8f0"
          stroke="#2a1810"
          stroke-width="2"
        />
        <circle
          cx="50"
          cy="72"
          r="32"
          fill="#a8d8f0"
          stroke="#2a1810"
          stroke-width="3"
        />
        <g clip-path="url(#splash-flask-clip)">
          <rect x="18" y="58" width="64" height="50" fill="#b88a5a" />
          <circle
            class="splash__bubble splash__bubble--a"
            cx="42"
            cy="92"
            r="2.5"
            fill="#f0e8d0"
          />
          <circle
            class="splash__bubble splash__bubble--b"
            cx="56"
            cy="96"
            r="2"
            fill="#f0e8d0"
          />
          <circle
            class="splash__bubble splash__bubble--c"
            cx="50"
            cy="88"
            r="1.8"
            fill="#f0e8d0"
          />
        </g>
        <ellipse
          cx="40"
          cy="58"
          rx="5"
          ry="10"
          fill="rgba(255,255,255,0.5)"
        />
      </svg>
    </div>
    <div id="app">
      <aside class="info">
        <div class="score" id="score">0</div>
        <div class="preview" id="preview">
          <canvas id="preview-canvas"></canvas>
        </div>
      </aside>
      <main class="playfield">
        <canvas id="playfield-canvas"></canvas>
        <div class="game-over" id="game-over" aria-hidden="true" hidden>
          <div class="game-over__panel">
            <div class="game-over__title">Game Over</div>
            <div class="game-over__score" id="game-over-score">0</div>
            <div class="game-over__hint">
              <span class="game-over__hint-landscape"
                >Press SPACE to play again.</span
              >
              <span class="game-over__hint-portrait"
                >Double-tap to play again.</span
              >
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
