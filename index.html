<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <link rel="icon" href="data:," />
    <link rel="apple-touch-icon" href="data:," />
    <title>Naturalchimie</title>
  </head>
  <body>
    <div id="app">
      <aside class="info">
        <div class="score" id="score">0</div>
        <div class="preview" id="preview">
          <canvas id="preview-canvas"></canvas>
        </div>
      </aside>
      <main class="playfield">
        <canvas id="playfield-canvas"></canvas>
        <div class="game-over" id="game-over" aria-hidden="true" hidden>
          <div class="game-over__panel">
            <div class="game-over__title">Game Over</div>
            <div class="game-over__score" id="game-over-score">0</div>
            <div class="game-over__hint">
              <span class="game-over__hint-landscape"
                >Press SPACE to play again.</span
              >
              <span class="game-over__hint-portrait"
                >Double-tap to play again.</span
              >
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
